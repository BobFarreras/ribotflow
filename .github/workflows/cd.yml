# ==========================================
# RIBOTFLOW - CD Pipeline (GitHub Actions)
# Data: 21/05/2026
# ==========================================

name: CD - Desplegament i Docker Build

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bobfarreras/ribotflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build Next.js
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_APP_MODE=self_hosted
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployment bundle
        run: |
          mkdir -p deploy-bundle/docker
          cp docker-compose.prod.yml deploy-bundle/
          cp docker-compose.caddy.yml deploy-bundle/
          cp docker-compose.traefik.yml deploy-bundle/
          cp scripts/install.sh deploy-bundle/
          cp scripts/manage.sh deploy-bundle/
          cp -r docker/caddy deploy-bundle/docker/
          cp -r docker/postgres deploy-bundle/docker/
          cp -r docker/scripts deploy-bundle/docker/
          cp .env.production deploy-bundle/.env.production
          cp INSTALL.md deploy-bundle/
          cd deploy-bundle
          tar -czf ../ribotflow-deploy.tar.gz .
          cd ..

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v4
        with:
          name: ribotflow-deploy
          path: ribotflow-deploy.tar.gz
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        with:
          tag_name: deploy-${{ github.sha }}
          name: Deploy ${{ github.sha }}
          files: ribotflow-deploy.tar.gz
          make_latest: true
          generate_release_notes: true
