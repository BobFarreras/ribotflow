# ==========================================
# RIBOTFLOW - Docker Compose (Production)
# Traefik handles HTTPS (like n8n/portainer)
# ==========================================

services:
  # --- Next.js Application ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ribotflow-app
    env_file: .env.local
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/ribotflow
      - NEXT_PUBLIC_APP_URL=https://ssribotflow.digitaistudios.com
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ribotflow.rule=Host(`ssribotflow.digitaistudios.com`)"
      - "traefik.http.routers.ribotflow.entrypoints=websecure"
      - "traefik.http.routers.ribotflow.tls.certresolver=letsencrypt"
      - "traefik.http.services.ribotflow.loadbalancer.server.port=3000"
    restart: unless-stopped
    networks:
      - internal
      - traefik

  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: ribotflow-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=ribotflow
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ribotflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  # --- MinIO (Object Storage) ---
  minio:
    image: minio/minio:latest
    container_name: ribotflow-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ribotflow-minio.rule=Host(`ssminio.digitaistudios.com`)"
      - "traefik.http.routers.ribotflow-minio.entrypoints=websecure"
      - "traefik.http.routers.ribotflow-minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.ribotflow-minio.loadbalancer.server.port=9001"
    restart: unless-stopped
    networks:
      - internal
      - traefik

  # --- Database Backup (daily) ---
  backup:
    image: postgres:16-alpine
    container_name: ribotflow-backup
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        echo '[$(date)] Starting backup...';
        PGPASSWORD=${POSTGRES_PASSWORD} pg_dump -h db -U postgres ribotflow | gzip > /backups/ribotflow_$(date +%Y%m%d_%H%M%S).sql.gz;
        echo '[$(date)] Backup completed';
        # Keep only last 7 backups
        ls -t /backups/ribotflow_*.sql.gz | tail -n +8 | xargs -r rm;
        echo '[$(date)] Old backups cleaned';
        sleep 86400;
      done"
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

# --- Volumes ---
volumes:
  db_data:
    driver: local
  minio_data:
    driver: local
  app_uploads:
    driver: local
  backup_data:
    driver: local

# --- Networks ---
networks:
  internal:
    driver: bridge
  traefik:
    external: true
