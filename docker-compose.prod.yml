# ==========================================
# RIBOTFLOW - Docker Compose (Production)
# Agnostic base: no reverse proxy included.
# The app exposes port 3000 for any external
# reverse proxy (Caddy, Traefik, Nginx, Apache).
# ==========================================
# Quick start (no proxy):
#   docker compose -f docker-compose.prod.yml up -d
# With Caddy:
#   docker compose -f docker-compose.prod.yml -f docker-compose.caddy.yml up -d
# With Traefik:
#   docker compose -f docker-compose.prod.yml -f docker-compose.traefik.yml up -d
# ==========================================

services:
  # --- Next.js Application ---
  app:
    build: .
    container_name: ribotflow-app
    env_file: .env
    environment:
      - NODE_ENV=production
      - STORAGE_PROVIDER=minio
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    # Override Dockerfile HEALTHCHECK which uses localhost (IPv6 broken in Alpine)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - app_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - internal

  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: ribotflow-db
    env_file: .env
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ribotflow
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ribotflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  # --- MinIO (Object Storage) ---
  minio:
    image: minio/minio:latest
    container_name: ribotflow-minio
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

  # --- Database Backup (daily) ---
  backup:
    image: postgres:16-alpine
    container_name: ribotflow-backup
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        echo '[$(date)] Starting backup...';
        PGPASSWORD=${POSTGRES_PASSWORD} pg_dump -h db -U postgres ribotflow | gzip > /backups/ribotflow_$(date +%Y%m%d_%H%M%S).sql.gz;
        echo '[$(date)] Backup completed';
        ls -t /backups/ribotflow_*.sql.gz | tail -n +8 | xargs -r rm;
        echo '[$(date)] Old backups cleaned';
        sleep 86400;
      done"
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

# --- Volumes ---
volumes:
  db_data:
    driver: local
  minio_data:
    driver: local
  app_uploads:
    driver: local
  backup_data:
    driver: local

# --- Network ---
networks:
  internal:
    driver: bridge
