# ==========================================
# RIBOTFLOW - Docker Compose (Development)
# Description: PostgreSQL only for local development.
#              Production uses Supabase, Self-Hosted uses full docker-compose.yml
# ==========================================

services:
  db:
    image: postgres:16-alpine
    container_name: ribotflow-dev-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ribotflow
    volumes:
      - ribotflow_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ribotflow_dev_data:
