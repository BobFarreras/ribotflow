# RIBOTFLOW Redis Configuration (Cloud mode)
# Used by BullMQ for async job queues

bind 127.0.0.1
port 6379

# Persistence
appendonly yes
appendfilename "ribotflow-appendonly.aof"

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security (uncomment and set password in production)
# requirepass your-secure-password-here

# Logging
loglevel notice
logfile ""
