# ==========================================
# RIBOTFLOW - Docker Compose (Self-Hosted)
# Data: 21/05/2026
# ==========================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_MODE=self_hosted
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ribotflow
      - AUTH_SECRET=${AUTH_SECRET:-change-me}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - app_data:/app/data

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ribotflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  app_data:
