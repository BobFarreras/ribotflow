# ==========================================
# RIBOTFLOW - Docker Compose (Traefik Override)
# Use with: docker compose -f docker-compose.prod.yml -f docker-compose.traefik.yml up -d
# ==========================================
# This adds Traefik labels to the app and MinIO console.
# Prerequisites: Traefik already running, network "traefik" exists.

services:
  # --- App: Add Traefik labels ---
  app:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ribotflow.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.ribotflow.entrypoints=websecure"
      - "traefik.http.routers.ribotflow.tls.certresolver=letsencrypt"
      - "traefik.http.services.ribotflow.loadbalancer.server.port=3000"
    networks:
      - internal
      - traefik

  # --- MinIO: Add Traefik labels (optional console access) ---
  minio:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ribotflow-minio.rule=Host(`minio.${DOMAIN}`)"
      - "traefik.http.routers.ribotflow-minio.entrypoints=websecure"
      - "traefik.http.routers.ribotflow-minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.ribotflow-minio.loadbalancer.server.port=9001"
    networks:
      - internal
      - traefik

# --- External Traefik Network ---
# NOTE: Your Traefik might use "traefik-public". Change this if needed.
networks:
  traefik:
    external: true
    name: traefik-public
