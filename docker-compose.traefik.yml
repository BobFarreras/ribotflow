# ==========================================
# RIBOTFLOW - Docker Compose (Traefik Override)
# Use with: docker compose -f docker-compose.prod.yml -f docker-compose.traefik.yml up -d
# ==========================================
# Prerequisites: Traefik already running with Docker provider.
# IMPORTANT: Change "myresolver" to match your Traefik certificate resolver name.
# If your Traefik uses "letsencrypt" or "le" as resolver name, update the labels below.
# After any label change, restart Traefik: docker restart traefik

services:
  # --- App: Add Traefik labels ---
  app:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ribotflow.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.ribotflow.entrypoints=websecure"
      - "traefik.http.routers.ribotflow.tls.certresolver=myresolver"
      - "traefik.http.services.ribotflow.loadbalancer.server.port=3000"
    networks:
      - internal
      - traefik

networks:
  traefik:
    external: true
    name: traefik-public