# ==========================================
# RIBOTFLOW - Docker Compose (Traefik Override)
# Use with: docker compose -f docker-compose.prod.yml -f docker-compose.traefik.yml up -d
# ==========================================
# Prerequisites: Traefik already running with Docker provider.
# Configure TRAEFIK_NETWORK, TRAEFIK_ENTRYPOINT, and TRAEFIK_CERT_RESOLVER in .env.
# After any label change, restart Traefik if your setup does not auto-detect labels.

services:
  # --- App: Add Traefik labels ---
  app:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ribotflow.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.ribotflow.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.ribotflow.tls=true"
      - "traefik.http.routers.ribotflow.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.ribotflow.loadbalancer.server.port=3000"
    networks:
      - internal
      - traefik

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-public}
